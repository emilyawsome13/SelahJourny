<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selah | Reset Password</title>
  <meta
    name="description"
    content="Reset your Selah account password and return to your prayer dashboard."
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body class="reset-body">
  <main class="reset-shell">
    <section class="reset-card">
      <a class="brand reset-brand" href="/" aria-label="Back to Selah home">
        <span class="brand-mark">S</span>
        <span class="brand-copy">
          <strong>Selah</strong>
          <span>Password Recovery</span>
        </span>
      </a>

      <p class="eyebrow">Account recovery</p>
      <h1>Choose a new password</h1>
      <p class="reset-support-copy" id="reset-support-copy">
        Checking your reset link...
      </p>

      <p class="status-message is-neutral" id="reset-status" aria-live="polite">
        Verifying token...
      </p>

      <form class="reset-form" id="reset-form" hidden>
        <label class="form-field">
          <span>New password</span>
          <input type="password" name="password" autocomplete="new-password" minlength="8" required>
        </label>

        <label class="form-field">
          <span>Confirm password</span>
          <input type="password" name="confirmPassword" autocomplete="new-password" minlength="8" required>
        </label>

        <button class="button button-primary form-submit" type="submit">
          Update Password
        </button>
      </form>

      <div class="reset-actions">
        <a class="button button-secondary" href="/?auth=login">Back to Login</a>
        <a class="button button-ghost" href="/">Selah Home</a>
      </div>
    </section>
  </main>

  <script src="reset-password.js"></script>
</body>
</html>
