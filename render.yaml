services:
  - type: web
    name: selah
    runtime: node
    plan: starter
    autoDeployTrigger: commit
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    disk:
      name: selah-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_BASE_URL
        sync: false
      - key: DATA_DIR
        value: /var/data/data
      - key: EMAIL_DIR
        value: /var/data/emails
      - key: EMAIL_FROM
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: BIBLE_API_BASE_URL
        value: https://bible.helloao.org
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
